<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>Selamat Hari Raya Idul Fitri</title>
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- CSS External -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Background paralaks -->
    <div class="parallax-bg" id="parallaxBg"></div>
    <!-- overlay pola geometris islami -->
    <div class="pattern-overlay"></div>

    <!-- 3 Lentera Emas Islami dengan variasi ukuran dan posisi -->
  <div class="lanterns-container">
    <!-- Lentera 1 - Kiri (Sedang) -->
    <div class="lantern lantern-medium lantern-1">
      <div class="lantern-chain"></div>
      <div class="lantern-cap"></div>
      <div class="lantern-body">
        <div class="lantern-frame-vertical"></div>
        <div class="lantern-frame-horizontal"></div>
        <div class="lantern-ornament"></div>
        <div class="lantern-glass"></div>
        <div class="lantern-glow"></div>
      </div>
      <div class="lantern-base"></div>
      <div class="lantern-tassel"></div>
    </div>

    <!-- Lentera 2 - Tengah (Besar) -->
    <div class="lantern lantern-large lantern-2">
      <div class="lantern-chain"></div>

    <!-- Lentera 3 - Kanan (Kecil) -->
    <div class="lantern lantern-small lantern-3">
      <div class="lantern-chain"></div>
      <div class="lantern-cap"></div>
      <div class="lantern-body">
        <div class="lantern-frame-vertical"></div>
        <div class="lantern-frame-horizontal"></div>
        <div class="lantern-ornament"></div>
        <div class="lantern-glass"></div>
        <div class="lantern-glow"></div>
      </div>
      <div class="lantern-base"></div>
      <div class="lantern-tassel"></div>
    </div>
  </div>


    <!-- elemen bulan sabit dan bintang minimalis -->
    <div class="crescent-star">
      <div class="crescent"></div>
      <div class="star">★</div>
      <div class="star2">✧</div>
    </div>
    <div class="star-deco">✦</div>

    <!-- konten utama -->
    <div class="content">
      <div class="message">🌙 Kami sekeluarga mengucapkan 💫</div>
      <div class="main-title">Selamat Hari Raya Idul Fitri 1447 H</div>
      <div class="arabic">تَقَبَّلَ اللَّهُ مِنَّا وَمِنْكُمْ</div>
      <div class="arabic arabic-sub">(Semoga Allah menerima amal kita)</div>
      <div class="message">| Agus Hariyanto sekeluarga |</div>
      <br>
      <div class="footer">© 2026 amdorigin. All rights reserved</div>
    </div>

    <!-- canvas untuk efek partikel kembang api -->
    <canvas id="fireworks-canvas"></canvas>

    <!-- JavaScript External -->
    <script src="script.js"></script>
  </body>
</html>
